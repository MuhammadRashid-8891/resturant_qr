<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Kitchen & Bakes</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@600&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fef8f0;
            color: #2c241a;
        }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, #1f2b1c, #2e3a24);
            color: #fff;
            text-align: center;
            padding: 25px;
            border-radius: 0 0 30px 30px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
        }

        /* NOTICE */
        .notice {
            background: #fff3cd;
            text-align: center;
            padding: 8px;
            font-size: 12px;
        }

        /* SEARCH */
        .controls {
            padding: 10px;
            position: sticky;
            top: 0;
            background: #fef8f0;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: 1px solid #ddd;
        }

        /* POPULAR */
        .popular {
            padding: 12px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }

        .pop-card {
            min-width: 140px;
            background: #fff;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }

        /* MENU */
        .menu {
            padding: 10px;
        }

        .card {
            display: flex;
            background: #fff;
            border-radius: 15px;
            margin-bottom: 10px;
            overflow: hidden;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.05);
        }

        .card img {
            width: 100px;
            object-fit: cover;
            transition: 0.3s;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .content {
            padding: 10px;
            flex: 1;
        }

        button {
            background: #e6a341;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* CART */
        .cart {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: #fff;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .cart.active {
            box-shadow: 0 0 0 3px orange;
        }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c241a;
            color: #fff;
            padding: 8px 15px;
            border-radius: 20px;
            opacity: 0;
            transition: 0.3s;
        }

        /* REVIEWS */
        .reviews {
            padding: 15px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>

<body>

    <div class="hero">
        <h1>Top Kitchen & Bakes</h1>
        <p>Arabian · Chinese · Indian</p>
    </div>

    <div class="notice">
        ⏳ Orders may take 20–40 mins during peak hours
    </div>

    <div class="controls">
        <input id="search" placeholder="Search food...">
    </div>

    <h3 style="padding:10px;">🔥 Most Loved</h3>
    <div class="popular" id="popular"></div>

    <div class="menu" id="menu"></div>

    <div class="reviews">
        ⭐ "Alfaham is really tasty 😋"<br>
        ⭐ "Budget friendly"<br>
        ⚠ Service may be slow during rush
    </div>

    <div class="cart" id="cart">
        🛒 Cart: <span id="count">0</span>
    </div>

    <div id="toast"></div>

    <script>

        const items = [
            { name: "Chicken Biryani", price: 165, img: "https://images.unsplash.com/photo-1563379091339" },
            { name: "Alfaham Mandi", price: 320, img: "https://images.unsplash.com/photo-1610057099443", popular: true },
            { name: "Shawarma", price: 110, img: "https://images.unsplash.com/photo-1626700051175", popular: true },
            { name: "Falooda", price: 85, img: "https://images.unsplash.com/photo-1563805042", popular: true },
            { name: "Butter Chicken", price: 210, img: "https://images.unsplash.com/photo-1603894584373", popular: true }
        ];

        let cart = 0;

        function render() {
            let html = "";
            items.forEach(i => {
                html += `
    <div class="card">
      <img src="${i.img}">
      <div class="content">
        <b>${i.name}</b><br>
        ₹${i.price}<br>
        <button onclick="add('${i.name}')">Add</button>
      </div>
    </div>`;
            });
            menu.innerHTML = html;
        }

        function renderPopular() {
            let p = items.filter(i => i.popular);
            popular.innerHTML = p.map(i => `
    <div class="pop-card">
      <img src="${i.img}" style="width:100%;border-radius:10px">
      <b>${i.name}</b><br>₹${i.price}
    </div>
  `).join("");
        }

        function add(name) {
            cart++;
            count.innerText = cart;
            showToast(name + " added");
            highlightCart();
        }

        function showToast(t) {
            toast.innerText = t;
            toast.style.opacity = 1;
            setTimeout(() => toast.style.opacity = 0, 2000);
        }

        function highlightCart() {
            cartDiv = document.getElementById("cart");
            cartDiv.classList.add("active");
            setTimeout(() => cartDiv.classList.remove("active"), 800);
        }

        render();
        renderPopular();

    </script>

</body>

</html>

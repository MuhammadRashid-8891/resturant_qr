<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Top Kitchen & Bakes — Digital Order Menu with Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-cream: #fef8f0;
      --card-white: #ffffff;
      --ink-dark: #2c241a;
      --ink-soft: #5e4b38;
      --spice-orange: #d45c2c;
      --golden: #e6a341;
      --sage-green: #4f7a5c;
      --border-light: #f0e2d2;
      --shadow-sm: 0 8px 20px rgba(0,0,0,0.05);
      --shadow-md: 0 12px 28px rgba(0,0,0,0.08);
      --radius-card: 20px;
      --radius-btn: 40px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-cream);
      color: var(--ink-dark);
      scroll-behavior: smooth;
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(135deg, #1f2b1c 0%, #2e3a24 100%);
      color: white;
      padding: 28px 20px 24px;
      text-align: center;
      position: relative;
      border-radius: 0 0 32px 32px;
    }
    .kitchen-badge {
      font-size: 11px;
      letter-spacing: 2px;
      background: rgba(230,163,65,0.2);
      display: inline-block;
      padding: 4px 16px;
      border-radius: 60px;
      margin-bottom: 10px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.3rem;
      font-weight: 700;
    }
    .hero-tag {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 4px;
    }
    .info-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 14px;
      font-size: 11px;
      background: rgba(0,0,0,0.35);
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      padding: 6px 16px;
      border-radius: 60px;
    }

    /* Controls */
    .controls-sticky {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(254,248,240,0.96);
      backdrop-filter: blur(12px);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-light);
    }
    .search-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 13px;
      color: #b58b6b;
    }
    #searchInput {
      width: 100%;
      padding: 12px 16px 12px 42px;
      border-radius: 48px;
      border: 1px solid var(--border-light);
      background: white;
      font-size: 14px;
      outline: none;
    }
    #searchInput:focus {
      border-color: var(--spice-orange);
    }
    .filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .filter-chip {
      background: white;
      border: 1px solid var(--border-light);
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .filter-chip.veg-active {
      background: var(--sage-green);
      border-color: var(--sage-green);
      color: white;
    }
    .tabs-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: thin;
      padding-bottom: 5px;
    }
    .tab-button {
      flex-shrink: 0;
      background: transparent;
      border: none;
      padding: 6px 18px;
      font-weight: 500;
      font-size: 13px;
      border-radius: 40px;
      cursor: pointer;
      background: #fff;
      border: 1px solid #e6d5c4;
    }
    .tab-button.active-tab {
      background: var(--ink-dark);
      color: white;
      border-color: var(--ink-dark);
    }

    /* Cart Sidebar (floating panel) */
    .cart-panel {
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      background: var(--card-white);
      border-radius: 32px;
      box-shadow: 0 12px 34px rgba(0,0,0,0.2);
      z-index: 200;
      transition: all 0.3s;
      border: 1px solid var(--border-light);
      max-width: 420px;
      margin: 0 auto;
      backdrop-filter: blur(0px);
    }
    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: var(--ink-dark);
      color: white;
      border-radius: 32px 32px 0 0;
      cursor: pointer;
      font-weight: 600;
    }
    .cart-items {
      max-height: 0;
      overflow-y: auto;
      transition: max-height 0.3s ease;
      background: white;
      border-radius: 0 0 32px 32px;
    }
    .cart-panel.open .cart-items {
      max-height: 380px;
      padding: 12px 16px;
    }
    .cart-item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0e2d2;
      font-size: 13px;
    }
    .cart-item-controls button {
      background: #f0e2d2;
      border: none;
      width: 24px;
      height: 24px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
    }
    .cart-total {
      font-weight: 700;
      padding: 10px 0;
      display: flex;
      justify-content: space-between;
      border-top: 2px solid var(--golden);
      margin-top: 8px;
    }
    .wa-cart-btn {
      background: #25D366;
      color: white;
      border: none;
      width: 100%;
      padding: 12px;
      border-radius: 60px;
      font-weight: 700;
      margin-top: 8px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }
    .clear-cart {
      background: transparent;
      border: none;
      color: #b87c4f;
      text-decoration: underline;
      font-size: 12px;
    }

    /* Main Menu */
    .main-container {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 16px 140px;
    }
    .section-category {
      margin-top: 28px;
    }
    .category-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      font-weight: 600;
      border-left: 5px solid var(--spice-orange);
      padding-left: 14px;
      margin-bottom: 18px;
      color: #2e3a24;
    }
    .menu-card {
      background: var(--card-white);
      border-radius: var(--radius-card);
      margin-bottom: 14px;
      display: flex;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      transition: transform 0.2s;
    }
    .menu-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .card-content {
      flex: 1;
      padding: 12px 12px 12px 14px;
    }
    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 6px;
    }
    .item-name {
      font-weight: 700;
      font-size: 1rem;
    }
    .veg-indicator {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: inline-block;
    }
    .veg-indicator.veg {
      background: var(--sage-green);
      box-shadow: inset 0 0 0 2px white;
      border: 1px solid var(--sage-green);
    }
    .veg-indicator.nonveg {
      background: var(--spice-orange);
      box-shadow: inset 0 0 0 2px white;
      border: 1px solid var(--spice-orange);
    }
    .item-desc {
      font-size: 11.5px;
      color: #7a6a5c;
      margin: 6px 0 6px;
      line-height: 1.35;
    }
    .price-tag {
      font-weight: 700;
      font-size: 1rem;
      color: var(--spice-orange);
    }
    .add-btn {
      background: var(--golden);
      border: none;
      padding: 5px 12px;
      border-radius: 40px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      color: #2c241a;
    }
    .card-img {
      width: 95px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      border-left: 1px solid var(--border-light);
    }
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #a2907e;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px);}
      to { opacity: 1; transform: translateY(0);}
    }
    .menu-card { animation: fadeSlide 0.25s ease; }

    .badge-group {
      display: flex;
      gap: 5px;
      margin-top: 6px;
    }
    .badge {
      font-size: 9px;
      background: #f8efe6;
      padding: 2px 8px;
      border-radius: 30px;
    }
    .cart-badge-count {
      background: var(--spice-orange);
      border-radius: 30px;
      padding: 2px 8px;
      font-size: 12px;
      margin-left: 8px;
    }
  </style>
</head>
<body>

<header class="hero">
  <div class="kitchen-badge">✦ NEDUMANGAD'S FAVOURITE ✦</div>
  <h1>Top Kitchen<br><span style="font-size: 1rem;">&amp; Bakes</span></h1>
  <p class="hero-tag">Arabian · Chinese · Indian · Halal</p>
  <div class="info-row">
    <span>📍 Arafa Complex, Kulavikonam</span>
    <span>⏰ 11 AM – 11 PM</span>
    <span>📞 +91 77868 00300</span>
  </div>
</header>

<div class="controls-sticky">
  <div class="search-wrap">

  <div class="filter-row">

<main class="main-container" id="menuContainer"></main>

<!-- Floating Cart Panel -->
<div class="cart-panel" id="cartPanel">

    <span>🛒 Your Selection <span id="cartCountBadge">0</span></span>
    <span>▼</span>
  </div>
  <div class="cart-items" id="cartItemsContainer">
    <div style="text-align:center; padding: 12px;">Your order list is empty</div>
  </div>
</div>

    { id: 21, name: "Malabar Falooda", category: "Desserts & Drinks", veg: true, price: 85, desc: "Rose syrup, sabja, ice cream, nuts.", emoji: "🍨", img: "https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=150&h=150&fit=crop", tags: ["popular"] },

    { id: 23, name: "Spanish Monster Shake", category: "Desserts & Drinks", veg: true, price: 150, desc: "Chocolate shake with brownie", emoji: "🥛", img: "https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=150&h=150&fit=crop", tags: [] },
    { id: 24, name: "Fresh Lime Soda", category: "Desserts & Drinks", veg: true, price: 40, desc: "Sweet or salt, refreshing", emoji: "🍋", img: "https://images.unsplash.com/photo-1570280956735-1e5d6a6c2c53?w=150&h=150&fit=crop", tags: [] },
    { id: 25, name: "Vanilla Ice Cream", category: "Desserts & Drinks", veg: true, price: 100, desc: "Creamy scoop", emoji: "🍦", img: "https://images.unsplash.com/photo-1579954115547-a9551f118e7c?w=150&h=150&fit=crop", tags: [] },
    { id: 26, name: "Chicken Pizza (Med)", category: "Pizza & Bakes", veg: false, price: 220, desc: "Cheesy pizza with chicken & capsicum.", emoji: "🍕", img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=150&h=150&fit=crop", tags: [] },
    { id: 27, name: "Veg Pizza", category: "Pizza & Bakes", veg: true, price: 190, desc: "Corn, capsicum, olives, cheese.", emoji: "🍕", img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=150&h=150&fit=crop", tags: [] }
  ];

  // Cart state: { id: quantity }
  let cart = {};
  
  // UI state
  let activeCategory = "All";
  let searchQuery = "";
  let vegFilterActive = false;
  
  const menuContainer = document.getElementById("menuContainer");
  const searchInput = document.getElementById("searchInput");
  const vegBtn = document.getElementById("vegFilterBtn");
  const resetBtn = document.getElementById("resetFilterBtn");
  const tabsDiv = document.getElementById("categoryTabs");
  const cartPanel = document.getElementById("cartPanel");
  const cartItemsDiv = document.getElementById("cartItemsContainer");
  const cartCountSpan = document.getElementById("cartCountBadge");
  const cartHeader = document.getElementById("cartHeader");
  
  let panelOpen = false;
  cartHeader.addEventListener("click", () => {
    panelOpen = !panelOpen;
    if (panelOpen) cartPanel.classList.add("open");
    else cartPanel.classList.remove("open");
  });
  
  // Helper: get all categories
  const allCategories = ["All", ...new Set(MENU_ITEMS.map(i => i.category))];
  
  function buildTabs() {
    tabsDiv.innerHTML = "";
    allCategories.forEach(cat => {
      const btn = document.createElement("button");
      btn.textContent = cat;
      btn.classList.add("tab-button");
      if (activeCategory === cat) btn.classList.add("active-tab");
      btn.addEventListener("click", () => {
        activeCategory = cat;
        searchQuery = "";
        searchInput.value = "";
        renderMenu();
        updateActiveTabStyles();
      });
      tabsDiv.appendChild(btn);
    });
  }
  
  function updateActiveTabStyles() {
    document.querySelectorAll(".tab-button").forEach((btn, idx) => {
      const cat = allCategories[idx];
      if (activeCategory === cat) btn.classList.add("active-tab");
      else btn.classList.remove("active-tab");
    });
  }
  
  function getFilteredItems() {
    let filtered = [...MENU_ITEMS];
    if (activeCategory !== "All") filtered = filtered.filter(i => i.category === activeCategory);
    if (vegFilterActive) filtered = filtered.filter(i => i.veg === true);
    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(i => i.name.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q));
    }
    return filtered;
  }
  
  function addToCart(itemId, itemName, price) {
    if (cart[itemId]) cart[itemId].qty += 1;
    else cart[itemId] = { id: itemId, name: itemName, price: price, qty: 1 };
    renderCartUI();
    renderMenu();  // refresh add button texts
  }
  
  function updateCartQty(itemId, delta) {
    if (cart[itemId]) {
      const newQty = cart[itemId].qty + delta;
      if (newQty <= 0) delete cart[itemId];
      else cart[itemId].qty = newQty;
    }
    renderCartUI();
    renderMenu();
  }
  
  function clearCart() {
    cart = {};
    renderCartUI();
    renderMenu();
  }
  
  function renderCartUI() {
    const itemsArray = Object.values(cart);
    const totalItems = itemsArray.reduce((sum, i) => sum + i.qty, 0);
    cartCountSpan.innerText = totalItems;
    if (totalItems === 0) {
      cartItemsDiv.innerHTML = `<div style="text-align:center; padding: 16px;">📭 No items selected yet</div>`;
      return;
    }
    let html = ``;
    let totalPrice = 0;
    itemsArray.forEach(item => {
      const itemTotal = item.price * item.qty;
      totalPrice += itemTotal;
      html += `
        <div class="cart-item-row">
          <span><strong>${item.name}</strong> x${item.qty}</span>
          <span>₹${itemTotal}</span>
          <div class="cart-item-controls">
            <button onclick="updateCartQty(${item.id}, -1)">-</button>
            <span style="margin:0 6px;">${item.qty}</span>
            <button onclick="updateCartQty(${item.id}, 1)">+</button>
          </div>
        </div>
      `;
    });
    html += `<div class="cart-total"><span>Total</span><span>₹${totalPrice}</span></div>`;
    html += `<button class="wa-cart-btn" id="sendOrderWaBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg> Send order to Waiter</button>`;
    html += `<button class="clear-cart" onclick="clearCart()">Clear all</button>`;
    cartItemsDiv.innerHTML = html;
    const sendBtn = document.getElementById("sendOrderWaBtn");
    if (sendBtn) sendBtn.addEventListener("click", () => sendOrderToWhatsApp());
  }
  
  function sendOrderToWhatsApp() {
    const itemsList = Object.values(cart);
    if (itemsList.length === 0) return;
    const tableParam = new URLSearchParams(window.location.search).get("table") || "";
    let message = `🍽️ *ORDER FROM TOP KITCHEN & BAKES* 🍽️%0A`;
    if (tableParam) message += `🏷️ Table: ${tableParam}%0A`;
    message += `------------------------%0A`;
    let total = 0;
    itemsList.forEach(item => {
      const itemTotal = item.price * item.qty;
      total += itemTotal;
      message += `• ${item.name} x${item.qty} = ₹${itemTotal}%0A`;
    });
    message += `------------------------%0A💵 *TOTAL: ₹${total}*%0A%0A🙋 Please confirm my order. Thank you!`;
    const phone = "917786800300";
    window.open(`https://wa.me/${phone}?text=${message}`, "_blank");
  }
  
  function renderMenu() {
    const filtered = getFilteredItems();
    if (!filtered.length) {
      menuContainer.innerHTML = `<div class="empty-state"><div style="font-size: 48px;">🍽️</div><h3>No dishes found</h3><p>Try other filters or search</p></div>`;
      return;
    }
    const grouped = {};
    filtered.forEach(item => { if (!grouped[item.category]) grouped[item.category] = []; grouped[item.category].push(item); });
    let html = "";
    for (let [cat, items] of Object.entries(grouped)) {
      html += `<div class="section-category"><div class="category-title">${cat}</div>`;
      items.forEach(item => {
        const qtyInCart = cart[item.id] ? cart[item.id].qty : 0;
        const btnText = qtyInCart > 0 ? `✓ Added (${qtyInCart})` : `+ Add to cart`;
        const tagHtml = item.tags.map(t => `<span class="badge">${t === "popular" ? "🔥 POPULAR" : "🌶️ SPICY"}</span>`).join("");
        html += `
          <div class="menu-card">
            <div class="card-content">
              <div class="item-header">
                <span class="item-name">${escapeHtml(item.name)}</span>
                <span class="veg-indicator ${item.veg ? 'veg' : 'nonveg'}"></span>
              </div>
              <div class="item-desc">${escapeHtml(item.desc)}</div>
              <div class="price-tag">₹${item.price}</div>
              <div class="badge-group">${tagHtml}</div>
              <button class="add-btn" data-id="${item.id}" data-name="${escapeHtml(item.name)}" data-price="${item.price}">${btnText}</button>
            </div>
            <div class="card-img" style="background-image: url('${item.img}'); background-size: cover; background-position: center;"></div>
          </div>
        `;
      });
      html += `</div>`;
    }
    menuContainer.innerHTML = html;
    document.querySelectorAll(".add-btn").forEach(btn => {
      const id = parseInt(btn.getAttribute("data-id"));
      const name = btn.getAttribute("data-name");
      const price = parseInt(btn.getAttribute("data-price"));
      btn.addEventListener("click", (e) => { e.stopPropagation(); addToCart(id, name, price); });
    });
  }
  
  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }
  
  // Event listeners
  searchInput.addEventListener("input", (e) => { searchQuery = e.target.value; if (searchQuery) { activeCategory = "All"; updateActiveTabStyles(); } renderMenu(); });
  vegBtn.addEventListener("click", () => { vegFilterActive = !vegFilterActive; vegBtn.classList.toggle("veg-active"); renderMenu(); });
  resetBtn.addEventListener("click", () => { vegFilterActive = false; searchQuery = ""; searchInput.value = ""; activeCategory = "All"; vegBtn.classList.remove("veg-active"); renderMenu(); updateActiveTabStyles(); });
  
  buildTabs();
  renderMenu();
  renderCartUI();
</script>
</body>
</html>
